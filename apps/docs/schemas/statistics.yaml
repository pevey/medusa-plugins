openapi: 3.1.0
info:
  title: Statistics API
  version: 0.1.1
  description: Dashboard statistics plugin for Medusa v2 with daily aggregation and customizable widgets
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/statistics:
    get:
      operationId: getAdminStatistics
      summary: List Statistics
      tags:
        - Admin
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum:
              - today
              - week
              - month
            default: week
        - name: start_date
          in: query
          required: false
          schema:
            type: string
        - name: end_date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/recalculate:
    post:
      operationId: postAdminStatisticsRecalculate
      summary: Recalculate Statistic
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/recent-orders:
    get:
      operationId: getAdminStatisticsRecent-orders
      summary: List Recent Orders
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: string
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/low-stock:
    get:
      operationId: getAdminStatisticsLow-stock
      summary: List Low Stock
      tags:
        - Admin
      parameters:
        - name: threshold
          in: query
          required: false
          schema:
            type: string
            default: 10
        - name: limit
          in: query
          required: false
          schema:
            type: string
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/layout:
    post:
      operationId: postAdminStatisticsLayout
      summary: Layout Statistic
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                layout:
                  type: array
                  items:
                    type: string
                x:
                  type: number
                y:
                  type: number
                w:
                  type: number
                h:
                  type: number
                visible:
                  type: boolean
                  default: true
              required:
                - layout
                - x
                - y
                - w
                - h
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
