openapi: 3.1.0
info:
  title: Forms API
  version: 0.2.0
  description: Form builder and submission management plugin for Medusa v2
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/forms:
    get:
      operationId: getAdminForms
      summary: List Forms
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  forms:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        handle:
                          type: string
                        description:
                          type: string
                        active:
                          type: string
                        turnstile_enabled:
                          type: string
                        notification_emails:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        form_fields:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminForms
      summary: Create Form
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                handle:
                  type: string
                description:
                  type: string
                  nullable: true
                active:
                  type: boolean
                turnstile_enabled:
                  type: boolean
                notification_emails:
                  type: array
                  items:
                    type: string
                  nullable: true
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
                form_fields:
                  type: array
                  items:
                    type: string
              required:
                - name
                - handle
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminForms
      summary: Batch Delete Forms
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/forms/{id}:
    get:
      operationId: getAdminFormsByid
      summary: Get Form
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  form:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      handle:
                        type: string
                      description:
                        type: string
                      active:
                        type: string
                      turnstile_enabled:
                        type: string
                      notification_emails:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      form_fields:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            label:
                              type: string
                            field_type:
                              type: string
                            required:
                              type: string
                            sort_order:
                              type: string
                            field_options:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  label:
                                    type: string
                                  value:
                                    type: string
                                  sort_order:
                                    type: string
    post:
      operationId: postAdminFormsByid
      summary: Update Form
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                handle:
                  type: string
                description:
                  type: string
                  nullable: true
                active:
                  type: boolean
                turnstile_enabled:
                  type: boolean
                notification_emails:
                  type: array
                  items:
                    type: string
                  nullable: true
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
                form_fields:
                  type: string
                label:
                  type: string
                field_type:
                  type: string
                required:
                  type: boolean
                sort_order:
                  type: number
              required:
                - name
                - label
                - field_type
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/forms/{id}/fields:
    get:
      operationId: getAdminFormsByidFields
      summary: List Fields
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        label:
                          type: string
                        field_type:
                          type: string
                        required:
                          type: string
                        options:
                          type: string
                        sort_order:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminFormsByidFields
      summary: Create Field
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminFormsByidFields
      summary: Batch Delete Fields
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/forms/{id}/fields/{fieldId}:
    post:
      operationId: postAdminFormsByidFieldsByfieldId
      summary: Update Field
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                label:
                  type: string
                field_type:
                  type: string
                required:
                  type: boolean
                sort_order:
                  type: number
                field_options:
                  type: string
                value:
                  type: string
              required:
                - label
                - value
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/forms/{id}/fields/{fieldId}/options:
    post:
      operationId: postAdminFormsByidFieldsByfieldIdOptions
      summary: Create Option
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                value:
                  type: string
                sort_order:
                  type: number
              required:
                - label
                - value
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminFormsByidFieldsByfieldIdOptions
      summary: Batch Delete Options
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/forms/{id}/fields/{fieldId}/options/{optionId}:
    post:
      operationId: postAdminFormsByidFieldsByfieldIdOptionsByoptionId
      summary: Update Option
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
        - name: optionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                value:
                  type: string
                sort_order:
                  type: number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/form-submissions:
    get:
      operationId: getAdminForm-submissions
      summary: List Form Submissions
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: form_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - new
              - read
              - archived
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  form-submissions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        data:
                          type: string
                        ip_address:
                          type: string
                        user_agent:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        form:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            handle:
                              type: string
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    delete:
      operationId: deleteAdminForm-submissions
      summary: Batch Delete Form Submissions
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/form-submissions/{id}:
    get:
      operationId: getAdminForm-submissionsByid
      summary: Get Form Submission
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  form-submission:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                      data:
                        type: string
                      ip_address:
                        type: string
                      user_agent:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      form:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          handle:
                            type: string
                          form_fields:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                name:
                                  type: string
                                label:
                                  type: string
                                field_type:
                                  type: string
    post:
      operationId: postAdminForm-submissionsByid
      summary: Update Form Submission
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - new
                    - read
                    - archived
              required:
                - status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /forms/{handle}:
    post:
      operationId: postFormsByhandle
      summary: Update Form
      tags:
        - Forms
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                data:
                  type: object
                  additionalProperties: true
              required:
                - data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
