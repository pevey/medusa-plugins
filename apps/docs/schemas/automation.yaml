openapi: 3.1.0
info:
  title: Automation API
  version: 0.1.0
  description: Automation plugin for Medusa v2 with triggers, actions, and HMAC signing
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/automations:
    get:
      operationId: getAdminAutomations
      summary: List Automations
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: trigger_type
          in: query
          required: false
          schema:
            type: string
        - name: is_active
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  automations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        trigger_type:
                          type: string
                        is_active:
                          type: boolean
                        trigger_events:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminAutomations
      summary: Create Automation
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                is_active:
                  type: boolean
                trigger_type:
                  type: string
                trigger_events:
                  type: array
                  items:
                    type: string
                trigger_signing_key:
                  type: string
                log_incoming:
                  type: boolean
                metadata:
                  type: object
                  additionalProperties: true
              required:
                - name
                - trigger_type
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminAutomations
      summary: Batch Delete Automations
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/automations/{id}:
    get:
      operationId: getAdminAutomationsByid
      summary: Get Automation
      tags:
