                action_type:
                  type: string
                target_url:
                  type: string
                signing_secret_id:
                  type: string
                  nullable: true
                request_method:
                  type: string
                target_headers:
                  type: array
                  items:
                    type: string
                medusa_workflow:
                  type: string
                field_mappings:
                  type: array
                  items:
                    type: string
                static_values:
                  type: array
                  items:
                    type: string
                metadata:
                  type: object
                  additionalProperties: true
              required:
                - name
                - action_type
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminAutomationsByidActions
      summary: Batch Delete Actions
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
