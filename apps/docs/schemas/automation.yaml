                      name:
                        type: string
                      description:
                        type: string
                      trigger_type:
                        type: string
                      is_active:
                        type: boolean
                      trigger_events:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
    post:
      operationId: postAdminAutomationsByid
      summary: Update Automation
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                is_active:
                  type: boolean
                trigger_events:
                  type: array
                  items:
                    type: string
                trigger_signing_key:
                  type: string
                log_incoming:
                  type: boolean
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
