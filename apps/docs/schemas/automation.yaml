                        target_url:
                          type: string
                        signing_secret_id:
                          type: string
                        target_headers:
                          type: string
                        medusa_workflow:
                          type: string
                        field_mappings:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
                        created_at:
