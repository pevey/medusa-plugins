openapi: 3.1.0
info:
  title: Customer Tags API
  version: 0.2.0
  description: Customer tagging plugin for Medusa v2
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/customer-tags:
    get:
      operationId: getAdminCustomer-tags
      summary: List Customer Tags
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer-tags:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        value:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminCustomer-tags
      summary: Create Customer Tag
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
              required:
                - value
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminCustomer-tags
      summary: Batch Delete Customer Tags
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/customer-tags/{id}:
    get:
      operationId: getAdminCustomer-tagsByid
      summary: Get Customer Tag
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer-tag:
                    type: object
                    properties:
                      id:
                        type: string
                      value:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
    post:
      operationId: postAdminCustomer-tagsByid
      summary: Update Customer Tag
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/customers/{id}:
    post:
      operationId: postAdminCustomersByid
      summary: Update Customer
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/customers/{id}/customer-tags:
    post:
      operationId: postAdminCustomersByidCustomer-tags
      summary: Create Customer Tag
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
