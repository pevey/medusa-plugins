openapi: 3.1.0
info:
  title: Tracing API
  version: 0.1.1
  description: Inventory tracing plugin for Medusa v2 with stock lots and serial numbers
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/stock-lots:
    get:
      operationId: getAdminStock-lots
      summary: List Stock Lots
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: inventory_item_id
          in: query
          required: false
          schema:
            type: string
        - name: stock_location_id
          in: query
          required: false
          schema:
            type: string
        - name: enabled
          in: query
          required: false
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  stock-lots:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        inventory_item_id:
                          type: string
                        stock_location_id:
                          type: string
                        lot_number:
                          type: string
                        description:
                          type: string
                        enabled:
                          type: string
                        stocked_quantity:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminStock-lots
      summary: Create Stock Lot
      tags:
        - Admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminStock-lots
      summary: Batch Delete Stock Lots
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: &a1
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required: &a2
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/stock-lots/enable:
    post:
      operationId: postAdminStock-lotsEnable
      summary: Enable Stock Lot
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: *a1
              required: *a2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/stock-lots/disable:
    post:
      operationId: postAdminStock-lotsDisable
      summary: Disable Stock Lot
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: *a1
              required: *a2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/stock-lots/{id}:
    get:
      operationId: getAdminStock-lotsByid
      summary: Get Stock Lot
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  stock-lot:
                    type: object
                    properties:
                      id:
                        type: string
                      inventory_item_id:
                        type: string
                      stock_location_id:
                        type: string
                      lot_number:
                        type: string
                      description:
                        type: string
                      enabled:
                        type: string
                      stocked_quantity:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      inventory_item:
                        type: object
                      stock_location:
                        type: object
    post:
      operationId: postAdminStock-lotsByid
      summary: Update Stock Lot
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inventory_item_id:
                  type: string
                stock_location_id:
                  type: string
                lot_number:
                  type: string
                description:
                  type: string
                  nullable: true
                enabled:
                  type: boolean
                stocked_quantity:
                  type: number
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/stock-lots/{id}/serial-numbers:
    get:
      operationId: getAdminStock-lotsByidSerial-numbers
      summary: List Serial Numbers
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  serial-numbers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        value:
                          type: string
                        order_id:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
  /admin/serial-numbers:
    get:
      operationId: getAdminSerial-numbers
      summary: List Serial Numbers
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: stock_lot_id
          in: query
          required: false
          schema:
            type: string
        - name: order_id
          in: query
          required: false
          schema:
            type: string
        - name: invalidated
          in: query
          required: false
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  serial-numbers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        stock_lot_id:
                          type: string
                        order_id:
                          type: string
                        value:
                          type: string
                        invalidated:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminSerial-numbers
      summary: Create Serial Number
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                stock_lot_id:
                  type: string
                value:
                  type: string
                invalidated:
                  type: boolean
                  default: false
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
              required:
                - order_id
                - stock_lot_id
                - value
                - invalidated
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminSerial-numbers
      summary: Batch Delete Serial Numbers
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/serial-numbers/{id}:
    get:
      operationId: getAdminSerial-numbersByid
      summary: Get Serial Number
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
