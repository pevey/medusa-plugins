      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  serial-number:
                    type: object
                    properties:
                      id:
                        type: string
                      stock_lot_id:
                        type: string
                      order_id:
                        type: string
                      value:
                        type: string
                      invalidated:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      stock_lot:
                        type: object
                      order:
                        type: object
    post:
      operationId: postAdminSerial-numbersByid
      summary: Update Serial Number
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                stock_lot_id:
                  type: string
                value:
                  type: string
                invalidated:
                  type: boolean
                  default: false
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
              required:
                - invalidated
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
