            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        slug:
                          type: string
                        format:
                          type: string
                        prefix:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
