                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminContent
      summary: Create Content
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                slug:
                  type: string
                format:
                  type: string
                prefix:
                  type: string
                  nullable: true
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
              required:
                - label
                - slug
                - format
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminContent
      summary: Batch Delete Content
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
