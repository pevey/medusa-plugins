openapi: 3.1.0
info:
  title: Barcodes API
  version: 0.1.0
  description: Barcode generation and management plugin for Medusa v2
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/barcodes:
    get:
      operationId: getAdminBarcodes
      summary: List Barcodes
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 15
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  barcodes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        inventory_item_id:
                          type: string
                        code:
                          type: string
                        type:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminBarcodes
      summary: Create Barcode
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                  nullable: true
              required:
                - url
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminBarcodes
      summary: Batch Delete Barcodes
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/barcodes/{id}:
    get:
      operationId: getAdminBarcodesByid
      summary: Get Barcode
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  barcode:
                    type: object
                    properties:
                      id:
                        type: string
                      inventory_item_id:
                        type: string
                      code:
                        type: string
                      type:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
    post:
      operationId: postAdminBarcodesByid
      summary: Update Barcode
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/barcode-generator:
    get:
      operationId: getAdminBarcode-generator
      summary: List Barcode Generator
      tags:
        - Admin
      parameters:
        - name: bcid
          in: query
          required: false
          schema:
            type: string
        - name: serial
          in: query
          required: false
          schema:
            type: string
        - name: height
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: postAdminBarcode-generator
      summary: Create Barcode Generator
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bcid:
                  type: string
                serial:
                  type: string
                height:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
