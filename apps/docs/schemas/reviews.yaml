openapi: 3.1.0
info:
  title: Reviews API
  version: 0.1.0
  description: Product review and rating plugin for Medusa v2 with moderation workflow
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/reviews:
    get:
      operationId: getAdminReviews
      summary: List Reviews
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
        - name: product_id
          in: query
          required: false
          schema:
            type: string
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        rating:
                          type: integer
                        title:
                          type: string
                        author_name:
                          type: string
                        author_email:
                          type: string
                        product_id:
                          type: string
                        order_id:
                          type: string
                        customer_id:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    delete:
      operationId: deleteAdminReviews
      summary: Batch Delete Reviews
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/reviews/{id}:
    get:
      operationId: getAdminReviewsByid
      summary: Get Review
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  review:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                      rating:
                        type: integer
                      title:
                        type: string
                      body:
                        type: string
                      author_name:
                        type: string
                      author_email:
                        type: string
                      product_id:
                        type: string
                      order_id:
                        type: string
                      customer_id:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      activity:
                        type: object
    post:
      operationId: postAdminReviewsByid
      summary: Update Review
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - pending
                    - approved
                    - rejected
                title:
                  type: string
                body:
                  type: string
                rating:
                  type: number
                  minimum: 1
                  maximum: 5
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminReviewsByid
      summary: Delete Review
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/reviews/approve:
    post:
      operationId: postAdminReviewsApprove
      summary: Approve Review
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/reviews/reject:
    post:
      operationId: postAdminReviewsReject
      summary: Reject Review
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /store/reviews/{productId}:
    post:
      operationId: postStoreReviewsByproductId
      summary: Update Review
      tags:
        - Store
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: number
                  minimum: 1
                  maximum: 5
                title:
                  type: string
                body:
                  type: string
                  minLength: 1
                author_name:
                  type: string
                  minLength: 1
                author_email:
                  type: string
                order_id:
                  type: string
              required:
                - rating
                - body
                - author_name
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
    get:
      operationId: getStoreReviewsByproductId
      summary: Get Review
      tags:
        - Store
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        rating:
                          type: integer
                        title:
                          type: string
                        body:
                          type: string
                        author_name:
                          type: string
                        product_id:
                          type: string
                        customer_id:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
