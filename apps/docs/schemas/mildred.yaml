openapi: 3.1.0
info:
  title: Mildred API
  version: 0.1.1
  description: Privacy-first analytics plugin for Medusa v2
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/analytics/rubrics:
    get:
      operationId: getAdminAnalyticsRubrics
      summary: List Rubrics
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: active
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rubrics:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        label:
                          type: string
                        description:
                          type: string
                        active:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminAnalyticsRubrics
      summary: Create Rubric
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                label:
                  type: string
                  minLength: 1
                description:
                  type: string
                expected_properties:
                  type: object
                  additionalProperties: true
                active:
                  type: boolean
              required:
                - name
                - label
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminAnalyticsRubrics
      summary: Batch Delete Rubrics
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/analytics/rubrics/{id}:
    get:
      operationId: getAdminAnalyticsRubricsByid
