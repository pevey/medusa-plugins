openapi: 3.1.0
info:
  title: Majel API
  version: 0.1.0
  description: Majel for Medusa v2
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/mcp:
    get:
      operationId: getAdminMcp
      summary: List Mcp
      tags:
        - Admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: postAdminMcp
      summary: Create Mcp
      tags:
        - Admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminMcp
      summary: Batch Delete Mcp
      tags:
        - Admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/statistics:
    get:
      operationId: getAdminStatistics
      summary: List Statistics
      tags:
        - Admin
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum:
              - today
              - week
              - month
            default: week
        - name: start_date
          in: query
          required: false
          schema:
            type: string
        - name: end_date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/recalculate:
    post:
      operationId: postAdminStatisticsRecalculate
      summary: Recalculate Statistic
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/recent-orders:
    get:
      operationId: getAdminStatisticsRecent-orders
      summary: List Recent Orders
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: string
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/low-stock:
    get:
      operationId: getAdminStatisticsLow-stock
      summary: List Low Stock
      tags:
        - Admin
      parameters:
        - name: threshold
          in: query
          required: false
          schema:
            type: string
            default: 10
        - name: limit
          in: query
          required: false
          schema:
            type: string
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/statistics/layout:
    post:
      operationId: postAdminStatisticsLayout
      summary: Layout Statistic
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                layout:
                  type: array
                  items:
                    type: string
                x:
                  type: number
                y:
                  type: number
                w:
                  type: number
                h:
                  type: number
                visible:
                  type: boolean
                  default: true
              required:
                - layout
                - x
                - y
                - w
                - h
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/webhook-triggers:
    get:
      operationId: getAdminWebhook-triggers
      summary: List Webhook Triggers
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: trigger_type
          in: query
          required: false
          schema:
            type: string
        - name: is_active
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook-triggers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        trigger_type:
                          type: string
                        is_active:
                          type: boolean
                        trigger_events:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
    post:
      operationId: postAdminWebhook-triggers
      summary: Create Webhook Trigger
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                is_active:
                  type: boolean
                trigger_type:
                  type: string
                trigger_events:
                  type: array
                  items:
                    type: string
                trigger_signing_key:
                  type: string
                log_incoming:
                  type: boolean
                metadata:
                  type: object
                  additionalProperties: true
              required:
                - name
                - trigger_type
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteAdminWebhook-triggers
      summary: Batch Delete Webhook Triggers
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  deleted:
                    type: boolean
  /admin/webhook-triggers/{id}:
    get:
      operationId: getAdminWebhook-triggersByid
