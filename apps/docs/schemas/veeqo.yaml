openapi: 3.1.0
info:
  title: Veeqo API
  version: 0.1.3
  description: Veeqo integration plugin for Medusa v2
servers:
  - url: http://localhost:9000
    description: Local development
paths:
  /admin/veeqo/customers/sync:
    post:
      operationId: postAdminVeeqoCustomersSync
      summary: Sync Customer
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - customer_ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/veeqo/orders/sync:
    post:
      operationId: postAdminVeeqoOrdersSync
      summary: Sync Order
      tags:
        - Admin
      requestBody:
        required: true
