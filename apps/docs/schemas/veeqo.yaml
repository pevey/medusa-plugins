            schema:
              type: object
              properties:
                order_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - order_ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/veeqo/products/sync:
