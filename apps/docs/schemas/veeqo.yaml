              properties:
                product_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - product_ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/veeqo/sales-channels/sync:
    post:
      operationId: postAdminVeeqoSales-channelsSync
      summary: Sync Sales Channel
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sales_channel_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - sales_channel_ids
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /admin/veeqo/shipping-options/sync:
    post:
      operationId: postAdminVeeqoShipping-optionsSync
